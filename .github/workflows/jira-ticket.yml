name: Create Jira Tickets from BRD

on:
  push:
    paths:
      - 'docs/BRD.md'   # trigger when BRD is updated

jobs:
  create-tickets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Create Jira Issue
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_USER_EMAIL: ${{ secrets.JIRA_USER_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
        run: |
          curl -X POST "$JIRA_BASE_URL/rest/api/3/issue" \
            -H "Authorization: Basic $(echo -n $JIRA_USER_EMAIL:$JIRA_API_TOKEN | base64)" \
            -H "Content-Type: application/json" \
            -d '{
              "fields": {
                "project": { "key": "AI_POC" },
                "summary": "BRD Review: Feature X",
                "description": {
                  "type": "doc",
                  "version": 1,
                  "content": [{"type": "paragraph", "content": [{"type": "text", "text": "Auto-created from BRD update"}]}]
                },
                "issuetype": { "name": "Story" }
              }
            }'
